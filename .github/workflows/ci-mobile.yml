name: CI — Mobile

on:
  push:
    branches: [dev, "feature/**", "fix/**", "chore/**"]
    paths:
      - "mobile-client/**"
      - ".github/workflows/ci-mobile.yml"
  pull_request:
    branches: [dev]
    paths:
      - "mobile-client/**"
      - ".github/workflows/ci-mobile.yml"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile-client/node_modules
          key: mobile-node-${{ hashFiles('mobile-client/package-lock.json') }}
          restore-keys: mobile-node-

      - name: Install dependencies
        working-directory: mobile-client
        run: npm ci

      - name: Audit dependencies
        working-directory: mobile-client
        run: npm audit --audit-level=high

      - name: TypeScript type check
        working-directory: mobile-client
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: mobile-client
        run: npm test -- --ci --forceExit --coverage
