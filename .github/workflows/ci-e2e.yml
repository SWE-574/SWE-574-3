name: CI — E2E (Playwright)

on:
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - "nginx/**"
      - ".github/workflows/ci-e2e.yml"
  pull_request:
    branches: [dev]

# Cancel in-progress E2E runs for the same branch to save minutes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # E2E tests are informational: the job always reports "success" so it never
    # blocks PRs or branch protection rules. Test results and HTML report are
    # still uploaded as artifacts for inspection.
    # Remove continue-on-error once the E2E suite is stable and fully reliable.
    continue-on-error: true

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Write environment file ──────────────────────────────────────────
      - name: Write .env
        run: |
          cp .env.example .env
          # Ensure DB and Redis point at the docker-compose service names
          sed -i 's|DB_HOST=.*|DB_HOST=db|'         .env || true
          sed -i 's|REDIS_HOST=.*|REDIS_HOST=redis|' .env || true
          sed -i 's|MINIO_ENDPOINT=.*|MINIO_ENDPOINT=minio:9000|' .env || true
          cat >> .env <<'EOF'
          SECRET_KEY=ci-e2e-secret-key-not-used-in-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DJANGO_E2E=1
          DISABLE_THROTTLING=1
          EOF

      # ── 3. Build & start the full dev stack in E2E mode ───────────────────
      - name: Build & start stack (E2E mode)
        run: |
          DJANGO_E2E=1 VITE_E2E=1 docker compose up -d --build

      # ── 4. Wait until every container reports "healthy" ───────────────────
      - name: Wait for containers to be healthy
        run: |
          READY=0
          for i in $(seq 1 24); do
            UNHEALTHY=$(docker compose ps --format json \
              | python3 -c "
          import sys, json
          rows = [json.loads(l) for l in sys.stdin if l.strip()]
          bad = [r['Name'] for r in rows if r.get('Health','') not in ('healthy','')]
          print('\n'.join(bad))
              ")
            if [ -z "$UNHEALTHY" ]; then
              echo "All containers healthy."
              READY=1
              break
            fi
            echo "Still waiting: $UNHEALTHY  ($i/24)"
            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            echo "::error::Containers did not become healthy in time"
            docker compose ps
            exit 1
          fi

      - name: Wait for backend stability
        run: |
          BACKEND_ID=$(docker compose ps -q backend)
          [ -n "$BACKEND_ID" ] || (echo "::error::Backend container not found" && docker compose ps && exit 1)

          STABLE_COUNT=0
          LAST_RESTARTS=-1
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Status}}' "$BACKEND_ID")
            HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$BACKEND_ID")
            RESTARTS=$(docker inspect --format='{{.RestartCount}}' "$BACKEND_ID")

            if [ "$STATUS" = "running" ] && [ "$HEALTH" = "healthy" ] && [ "$RESTARTS" = "$LAST_RESTARTS" ]; then
              STABLE_COUNT=$((STABLE_COUNT + 1))
            else
              STABLE_COUNT=0
            fi

            LAST_RESTARTS="$RESTARTS"

            if [ "$STABLE_COUNT" -ge 2 ]; then
              echo "Backend is stable."
              break
            fi

            echo "Waiting for stable backend... status=$STATUS health=$HEALTH restarts=$RESTARTS ($i/20)"
            sleep 3
          done

          if [ "$STABLE_COUNT" -lt 2 ]; then
            echo "::error::Backend did not stabilize in time"
            docker compose logs --no-color --tail=250 backend
            exit 1
          fi

      # ── 5. Smoke-test — ensure nginx is reachable ─────────────────────────
      - name: Smoke-test API health
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-connrefused \
            http://localhost/api/health/

      - name: Smoke-test MinIO media proxy
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-connrefused \
            http://localhost/hive-media/

      - name: Smoke-test frontend login route
        run: |
          curl --fail --retry 20 --retry-delay 3 --retry-connrefused \
            http://localhost/login > /dev/null

      # ── 6. Seed demo data ─────────────────────────────────────────────────
      - name: Seed demo data
        run: |
          set -euo pipefail
          DJANGO_E2E=1 docker compose exec -T backend \
            bash -lc "cd /code && DJANGO_SETTINGS_MODULE=hive_project.settings python setup_demo.py"

      # ── 7. Verify seeded users exist and passwords are valid ──────────────
      - name: Verify seeded demo users
        run: |
          DJANGO_E2E=1 docker compose exec -T backend \
            bash -lc "cd /code && DJANGO_SETTINGS_MODULE=hive_project.settings python manage.py shell -c \"from api.models import User; emails=['elif@demo.com','cem@demo.com','ayse@demo.com','mehmet@demo.com','zeynep@demo.com','can@demo.com','deniz@demo.com','burak@demo.com']; missing=[e for e in emails if not User.objects.filter(email=e).exists()]; bad_pw=[e for e in emails if User.objects.filter(email=e).exists() and not User.objects.get(email=e).check_password('demo123')]; assert not missing, f'Missing demo users: {missing}'; assert not bad_pw, f'Invalid demo passwords: {bad_pw}'; print(f'Validated {len(emails)} demo users')\""

      # ── 8. Verify auth/login endpoint works with demo credentials ─────────
      - name: Verify demo login API
        run: |
          RESPONSE=$(curl --silent --show-error --fail --retry 5 --retry-delay 2 --retry-connrefused \
            -H "Content-Type: application/json" \
            -d '{"email":"elif@demo.com","password":"demo123"}' \
            http://localhost/api/auth/login/)

          echo "$RESPONSE" | python3 -c "import json,sys; payload=json.load(sys.stdin); assert ('access' in payload or 'token' in payload), payload; assert 'refresh' in payload, payload"

      # ── 9. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 10. Remove Docker-owned node_modules (created as root) ────────────
      # The docker compose build bind-mounts ./frontend and installs packages
      # as root inside the container. Those root-owned files block npm ci
      # on the non-root runner. Removing them lets npm ci start fresh.
      - name: Remove Docker-owned node_modules
        run: sudo rm -rf frontend/node_modules

      # ── 11. Cache npm packages ────────────────────────────────────────────
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-e2e-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-e2e-

      # ── 12. Install JS dependencies (includes @playwright/test) ──────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── 13. Cache Playwright browsers ─────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-

      # ── 14. Install Playwright browsers ───────────────────────────────────
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── 15. Run E2E tests ─────────────────────────────────────────────────
      - name: Run Playwright tests
        id: playwright
        working-directory: frontend
        continue-on-error: true   # soft-fail: results visible in artifact, not a blocker
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
          CI: "true"
        run: npm run test:e2e

      # ── 16. Upload HTML report (always, so failures are inspectable) ──────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/tests/reports/playwright/
          retention-days: 14

      # ── 17. Upload JUnit XML (for CI summary) ─────────────────────────────
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: frontend/tests/reports/playwright-junit.xml
          retention-days: 14

      # ── 18. Collect docker logs on failure ────────────────────────────────
      - name: Dump docker logs on failure
        if: always() && (failure() || steps.playwright.outcome != 'success')
        run: |
          docker compose logs --no-color --tail=200 backend  2>&1 | head -400
          docker compose logs --no-color --tail=100 frontend 2>&1 | head -200
          docker compose logs --no-color --tail=100 nginx    2>&1 | head -200
          docker compose logs --no-color --tail=100 minio    2>&1 | head -200

      # ── 19. Tear down ─────────────────────────────────────────────────────
      - name: Tear down stack
        if: always()
        run: docker compose down -v
